<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

{% if title %}
<title>blogpost - {{ title }}</title>
{% else %}
<title>blogpost</title>
{% endif %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">

<style>
:root {
    --brand: #7c3aed;
    --brand-2: #06b6d4;
    --accent: #f43f5e;
}

/* BODY */
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg, #f8fafc, #e2e8f0);
}

[data-bs-theme="dark"] body {
    background: linear-gradient(180deg, #020617, #0f172a);
}

/* NAVBAR */
.navbar.bg-steel {
    background: linear-gradient(135deg, var(--brand), var(--brand-2)) !important;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}

[data-bs-theme="dark"] .navbar.bg-steel {
    background: linear-gradient(135deg, #4c1d95, #0da4ce) !important;
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}

/* CONTENT */
.content-section {
    border-radius: 16px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.05);
}

[data-bs-theme="dark"] .content-section {
    background: rgba(15,23,42,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.05);
}

/* BUTTONS */
.btn {
    border-radius: 999px;
}

.btn-primary, .btn-light {
    background: linear-gradient(135deg, var(--brand), var(--accent));
    border: none;
    color: white;
}

[data-bs-theme="dark"] .btn-light {
    background: linear-gradient(135deg, var(--brand), var(--accent));
}

/* MODALS */
.modal-content {
    border-radius: 16px;
}

[data-bs-theme="dark"] .modal-content {
    background: #0f172a;
    color: #e2e8f0;
    border: 1px solid rgba(255,255,255,0.05);
}
</style>

</head>

<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md bg-steel fixed-top" data-bs-theme="dark">
<div class="container">

<a class="navbar-brand text-white" href="{{ url_for('home') }}">blogpost</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<div class="navbar-nav me-auto">
<a class="nav-link text-white" href="{{ url_for('home') }}">Home</a>
</div>

<div class="navbar-nav align-items-center">

<!-- LOGGED IN -->
<div id="loggedInNav" class="d-none align-items-center">
<button class="btn btn-outline-light me-2"
        data-bs-toggle="modal"
        data-bs-target="#createPostModal">
New Post
</button>

<a class="btn btn-light me-3"
   href="{{ url_for('account_page') }}"
   id="accountBtn">
Account
</a>
</div>

<!-- LOGGED OUT -->
<div id="loggedOutNav" class="d-flex align-items-center">
<a class="btn btn-outline-light me-2" href="{{ url_for('login_page') }}">Login</a>
<a class="btn btn-light me-3" href="{{ url_for('register_page') }}">Register</a>
</div>

<!-- THEME -->
<div class="dropdown">
<a class="nav-link dropdown-toggle text-white" data-bs-toggle="dropdown">
<span id="bd-theme-text">🌗 Auto</span>
</a>

<ul class="dropdown-menu dropdown-menu-end">
<li><button class="dropdown-item" data-bs-theme-value="light">🌝 Light</button></li>
<li><button class="dropdown-item" data-bs-theme-value="dark">🌚 Dark</button></li>
<li><button class="dropdown-item" data-bs-theme-value="auto">🌗 Auto</button></li>
</ul>
</div>

</div>
</div>
</div>
</nav>

<!-- MAIN -->
<main class="container mt-5 pt-4">
<div class="row">

<div class="col-md-8">
{% block content %}{% endblock %}
</div>

<div class="col-md-4">
<div class="content-section p-3">
<h4>Sidebar</h4>
<p class="text-body-secondary">You can put any info here.</p>
</div>
</div>

</div>
</main>

<footer class="mt-auto text-center py-3">
© <span id="year"></span> blogpost
</footer>

<!-- MODALS -->

<!-- CREATE POST -->
<div class="modal fade" id="createPostModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5>New Post</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<form id="createPostForm">
<div class="modal-body">
<input class="form-control mb-2" name="title" placeholder="Title" required>
<textarea class="form-control" name="content" required></textarea>
</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
<button class="btn btn-primary">Post</button>
</div>
</form>

</div>
</div>
</div>

<!-- SUCCESS -->
<div class="modal fade" id="successModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header bg-success text-white">
<h5>Success</h5>
</div>
<div class="modal-body">
<p id="successMessage"></p>
</div>
</div>
</div>
</div>

<!-- ERROR -->
<div class="modal fade" id="errorModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header bg-danger text-white">
<h5>Error</h5>
</div>
<div class="modal-body">
<p id="errorMessage"></p>
</div>
</div>
</div>
</div>

<!-- SCRIPTS -->

<script>
document.getElementById('year').textContent = new Date().getFullYear();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- THEME -->
<script>
const setTheme = (theme) => {
    if (theme === 'auto') {
        document.documentElement.setAttribute(
            'data-bs-theme',
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        );
    } else {
        document.documentElement.setAttribute('data-bs-theme', theme);
    }

    localStorage.setItem('theme', theme);

    const text = { light:'🌝 Light', dark:'🌚 Dark', auto:'🌗 Auto' };
    document.getElementById('bd-theme-text').textContent = text[theme];
};

document.querySelectorAll('[data-bs-theme-value]')
.forEach(btn => btn.addEventListener('click',
    () => setTheme(btn.getAttribute('data-bs-theme-value'))
));

setTheme(localStorage.getItem('theme') || 'auto');
</script>

<!-- AUTH + CREATE POST -->
<script type="module">
import { getCurrentUser, getToken } from '/static/js/auth.js';
import { showModal, hideModal, getErrorMessage } from '/static/js/utils.js';

async function updateUI() {
    const user = await getCurrentUser();
    if (user) {
        loggedInNav.classList.remove('d-none');
        loggedOutNav.classList.add('d-none');
        accountBtn.textContent = user.username;
    } else {
        loggedInNav.classList.add('d-none');
        loggedOutNav.classList.remove('d-none');
    }
}
updateUI();

const form = document.getElementById("createPostForm");

if (form) {
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const token = getToken();
    if (!token) return location.href = "/login";

    const data = Object.fromEntries(new FormData(form));

    const res = await fetch("/api/posts", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        const post = await res.json();
        successMessage.textContent = `Post "${post.title}" created`;

        hideModal("createPostModal");
        showModal("successModal");

        form.reset();

        successModal.addEventListener("hidden.bs.modal",
            () => location.reload(), { once: true });

    } else {
        const err = await res.json();
        errorMessage.textContent = getErrorMessage(err);
        showModal("errorModal");
    }
});
}
</script>

{% block scripts %}{% endblock %}

</body>
</html>
